apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: '[]'
    capabilities: Deep Insights
    containerImage: us-docker.pkg.dev/workload-agent-products/cluster-services-for-openshift-telemetry-unstable/controller:v0.0.1
    description: Cluster Services for OpenShift - For deeper Integrations and best
      practices configuration with Google Cloud Products.
    features.operators.openshift.io/disconnected: "false"
    features.operators.openshift.io/fips-compliant: "false"
    features.operators.openshift.io/proxy-aware: "false"
    features.operators.openshift.io/tls-profiles: "false"
    features.operators.openshift.io/token-auth-aws: "false"
    features.operators.openshift.io/token-auth-azure: "false"
    features.operators.openshift.io/token-auth-gcp: "false"
    support: Google Cloud
  name: google-cloud-cluster-services-for-openshift-telemetry.v0.0.1
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: TelemetryConfig is the Schema for the telemetryconfigs API
      displayName: Telemetry Config
      kind: TelemetryConfig
      name: telemetryconfigs.cluster-services-openshift.cloud.google.com
      specDescriptors:
      - description: Enabled defines if the telemetry agent should be enabled
        displayName: Enabled
        path: enabled
      - description: The repository of the telemetry agent image to use.
        displayName: Image Repository
        path: imageRepository
      - description: The version of the telemetry agent image to use.
        displayName: Image Version
        path: imageVersion
      - description: |-
          The path of the service account's credentials stored as a secret. This is the credential that
          will be used to authenticate with the Google Cloud Telemetry Manager.
          If not specified, it defaults to "/var/run/secrets/google/service_account.json".
          In the case of Workload Identity Federation (WIF) / Workload Identity, this path points to the WIF config file.
          For example: "/var/run/secrets/cloud.google.com/serviceaccount/file-name"
        displayName: Service Account Credentials Path
        path: serviceAccountCredentialsPath
      - description: |-
          The name of the Kubernetes secret containing the service account's credentials. This is the
          credential that will be used to authenticate with the Google Cloud Telemetry Manager.
          If not specified, it defaults to "google-cloud-cluster-services-telemetry-agent-wif-secret".
          In the case of Workload Identity Federation (WIF) / Workload Identity, this secret is created
          by applying the secret manifests generated by the ccoctl tool from the CredentialsRequest.
        displayName: Service Account Credentials Secret Name
        path: serviceAccountCredentialsSecretName
      - description: The audience of the service account's token used for workload
          identity authentication requests.
        displayName: Service Account Token Audience
        path: serviceAccountTokenAudience
      statusDescriptors:
      - description: |-
          For further information see: https://github.com/kubernetes/community/blob/master/contributors/devel/sig-architecture/api-conventions.md#typical-status-properties
          Conditions store the status conditions of the OpenShift instances
        displayName: Conditions
        path: conditions
      version: v1alpha1
  description: |-
    Choose [Cluster Services for OpenShift][productlink] when you need the following:

    * Follow Best Practices: Validate configurations against Google Cloud and Red Hat recommended practices.
    * Improve Reliability: Proactively identify settings that could impact availability and resilience.
    * Strengthen Security: Ensure secure configurations for storage, secrets, and identity.
    * Optimize Total Cost of Ownership (TCO): Get recommendations for cost-effective service usage and configurations.

    ## Guide

    Follow [these][guidelink] steps to install and configure the Telemetry agent.

    ## Support

    For support, please file a support case through [Google Cloud Customer Care][supportlink].

    [productlink]: https://docs.cloud.google.com/compute/docs/containers/cluster-services-for-openshift-overview
    [guidelink]: https://docs.cloud.google.com/workload-manager/docs/evaluate/set-up-operator-for-openshift
    [supportlink]: https://cloud.google.com/support-hub
  displayName: Cluster Services for OpenShift Telemetry
  icon:
  - base64data: 
    mediatype: image/png
  install:
    spec:
      deployments: null
    strategy: ""
  installModes:
  - supported: true
    type: OwnNamespace
  - supported: false
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - google
  - cloud
  - workloadmanager
  - workload
  - manager
  links:
  - name: Cluster Services for OpenShift Telemetry
    url: https://docs.cloud.google.com/compute/docs/containers/openshift-overview
  maturity: stable
  provider:
    name: Google
    url: https://docs.cloud.google.com/
  relatedImages:
  - image: us-docker.pkg.dev/workload-agent-products/cluster-services-for-openshift-telemetry-unstable/controller:v0.0.1
    name: google-cloud-cluster-services-for-openshift-telemetry-controller
  version: 0.0.1
